<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FF14 职业输出轴（可拖拽）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="card">
        <h1>FF14 职业输出轴规划器</h1>
        <p>
          先选择职业并维护技能（图标/GCD），再根据副本时间轴把技能拖到对应时间点。
          系统会严格检查技能间隔，避免违反 GCD。
        </p>
      </header>

      <section class="card">
        <div class="row-between">
          <h2>1) 职业与技能库</h2>
          <label>
            当前职业
            <select id="job-select"></select>
          </label>
        </div>

        <form id="skill-form" class="inline-form">
          <input id="skill-name" type="text" required placeholder="技能名（例：毁荡）" />
          <input id="skill-gcd" type="number" min="0.5" step="0.1" required placeholder="GCD（秒）" />
          <select id="skill-type" required>
            <option value="gcd">GCD 技能</option>
            <option value="ability">能力技能</option>
          </select>
          <input id="skill-icon" type="file" accept="image/*" />
          <button type="submit">新增技能</button>
        </form>

        <ul id="skills-manager" class="list"></ul>
      </section>

      <section class="card">
        <div class="row-between">
          <h2>2) 副本时间轴</h2>
          <div class="actions">
            <label>
              模板
              <select id="encounter-template"></select>
            </label>
            <button id="load-template" type="button">加载模板</button>
          </div>
        </div>

        <form id="event-form" class="inline-form">
          <input id="event-time" type="number" min="0" step="0.1" required placeholder="时间（秒）" />
          <input id="event-name" type="text" required placeholder="机制名" />
          <button type="submit">新增机制点</button>
        </form>

        <ul id="event-manager" class="list"></ul>
      </section>

      <section class="card">
        <h2>3) 拖拽排轴</h2>
        <p class="tip">把下面技能图标拖到“输出轴”里的任意机制时间点。可拖动已放置技能进行改位。</p>
        <div id="skill-palette" class="palette"></div>
        <p id="status" class="status"></p>

        <div class="row-between subhead">
          <h3>输出轴</h3>
          <div class="actions">
            <button id="export-btn" type="button">导出方案 JSON</button>
            <label class="import-label">
              导入方案 JSON
              <input id="import-input" type="file" accept="application/json" />
            </label>
            <button id="clear-actions" type="button" class="danger">清空输出轴</button>
          </div>
        </div>

        <ul id="planner-timeline" class="timeline"></ul>
      </section>
    </main>

    <template id="skill-chip-template">
      <div class="skill-chip" draggable="true">
        <img class="icon" alt="skill icon" />
        <div>
          <div class="skill-title"></div>
          <div class="skill-meta"></div>
        </div>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
