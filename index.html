<!doctype html><html lang='zh-CN'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width,initial-scale=1.0'/><title>FF14 排轴界面</title><link rel='stylesheet' href='styles.css'/></head><body><main class='container'><header class='card'><h1>FF14 排轴界面（用户）</h1><p>仅用于选择职业/副本并拖拽排轴。后台管理请使用独立管理页。</p><p><a href='jobs-admin.html'>职业后台</a> · <a href='encounters-admin.html'>副本后台</a></p></header><section class='card'><div class='row-between'><h2>选择副本与职业</h2><div class='actions'><label>职业 <select id='planner-job'></select></label><label>副本 <select id='planner-encounter'></select></label></div></div><div><h3>GCD 技能</h3><div id='gcd-palette' class='palette'></div><h3>能力技</h3><div id='ogcd-palette' class='palette'></div></div><p id='status' class='status'></p><div id='timeline' class='timeline-scroll'></div></section></main><template id='skill-template'><div class='skill-chip' draggable='true'><img class='icon' alt='icon'/><span class='label'></span></div></template><script src='storage.js'></script><script src='planner.js'></script><script src='app.js'></script></body></html>
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FF14 副本轴规划器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="card">
        <h1>FF14 副本轴规划器</h1>
        <p>先在后台维护职业与副本数据，再到排轴页面选择一个副本和一个职业进行拖拽规划。</p>
      </header>

      <nav class="tabs card">
        <button class="tab-btn active" data-tab="planner">排轴页面</button>
        <button class="tab-btn" data-tab="jobs-admin">职业后台</button>
        <button class="tab-btn" data-tab="encounters-admin">副本后台</button>
      </nav>

      <section id="tab-planner" class="card tab-panel active">
        <div class="row-between">
          <h2>1) 选择副本与职业</h2>
          <div class="actions">
            <label>职业 <select id="planner-job"></select></label>
            <label>副本 <select id="planner-encounter"></select></label>
          </div>
        </div>

        <h3>2) 技能拖拽区（不遮挡时间轴）</h3>
        <div class="skill-panel">
          <div>
            <h4>GCD 技能</h4>
            <div id="gcd-palette" class="palette"></div>
          </div>
          <div>
            <h4>能力技（oGCD）</h4>
            <div id="ogcd-palette" class="palette"></div>
          </div>
        </div>

        <h3>3) 可横向拖动时间轴</h3>
        <p class="tip">每个时间点有两行：上方 GCD（每点最多 1 个），下方能力技（最多 2 个，且需跟在 GCD 后）。</p>
        <p id="status" class="status"></p>
        <div id="timeline" class="timeline-scroll"></div>
      </section>

      <section id="tab-jobs-admin" class="card tab-panel">
        <h2>职业后台</h2>
        <form id="job-form" class="inline-form">
          <input id="new-job-name" type="text" placeholder="新增职业名（例：SMN）" required />
          <button type="submit">新增职业</button>
        </form>
        <div class="row-between">
          <label>编辑职业 <select id="admin-job-select"></select></label>
          <button id="delete-job" class="danger" type="button">删除当前职业</button>
        </div>
        <form id="skill-form" class="inline-form">
          <input id="skill-name" type="text" placeholder="技能名" required />
          <select id="skill-type"><option value="gcd">GCD</option><option value="ogcd">能力技</option></select>
          <input id="skill-gcd" type="number" min="0.5" step="0.01" placeholder="基础 GCD（秒）" />
          <input id="skill-cast" type="number" min="0" step="0.01" placeholder="咏唱时间（秒）" value="0" />
          <input id="skill-icon" type="file" accept="image/*" />
          <button type="submit">新增技能</button>
        </form>
        <ul id="skills-list" class="list"></ul>
      </section>

      <section id="tab-encounters-admin" class="card tab-panel">
        <h2>副本后台</h2>
        <form id="encounter-form" class="inline-form">
          <input id="encounter-name" type="text" placeholder="副本名" required />
          <button type="submit">新增副本</button>
        </form>
        <div class="row-between">
          <label>编辑副本 <select id="encounter-select"></select></label>
          <button id="delete-encounter" class="danger" type="button">删除当前副本</button>
        </div>
        <form id="timeline-file-form" class="inline-form">
          <input id="timeline-file" type="file" accept="application/json" required />
          <button type="submit">上传时间轴 JSON</button>
        </form>
        <form id="event-form" class="inline-form">
          <input id="event-time" type="number" min="0" step="0.1" placeholder="时间（秒）" required />
          <input id="event-name" type="text" placeholder="机制名" required />
          <button type="submit">新增机制点</button>
        </form>
        <ul id="encounter-events" class="list"></ul>
      </section>
    </main>

    <template id="skill-template">
      <div class="skill-chip" draggable="true"><img class="icon" alt="icon" /><span class="label"></span></div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
